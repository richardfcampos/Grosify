services:
  postgres:
    image: postgres:17-alpine
    container_name: grosify-postgres
    environment:
      POSTGRES_USER: grosify
      POSTGRES_PASSWORD: grosify
      POSTGRES_DB: grosify
    ports:
      - '5433:5432'
    volumes:
      - grosify-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grosify']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  grosify-pgdata:
